# Channel-Scan follow-up — Chain LF (Light Flood)
# Pre-registered in 03_LIGHT_FLOOD_PREREG.md (timestamp 16:08 NSW).
#
# After chain T (matter-anchored) and chain T2 (matter-anchored,
# Planck-anchored start) both converged at h = 0.7361 with total
# χ² = 2126 — identical despite different starting basins — the
# matter-attractor peak is established as the global posterior
# maximum of any matter-heavy joint stack. The framework's
# predicted thermocline 𝒯 = 69.47 is structurally inaccessible
# to matter-heavy stacks under DGF physics at fixed w₀ = -0.933.
#
# Chain LF tests the converse: a light-flooded stack (~85% light /
# 15% boundary, with KiDS as the single boundary-check probe)
# should converge at the framework's predicted boundary.
#
# Stack changes from T2:
#   - Drop TDCOSMO h prior        (was the dominant matter anchor)
#   - Drop BOSS fσ8 likelihood    (was matter-channel growth probe)
#   - Keep Planck plik_lite, lowl, DESI BAO, KiDS-1000
#   - w₀ FIXED at -0.933 (same as T/T2; v7 inside training core)
#
# Predicted outcome: H₀ = 65.5 ± 1.5, post-hoc 𝒯_arithmetic = 69.40 ± 0.75
# (reproduces J6 = 69.51 ± 0.84 on extended stack).

theory:
  dgf_emulator_v7.DGFEmulator:
    python_path: /home/joe/Science/DGF/research/scripts
    w0: -0.933

likelihood:
  planck_2018_highl_plik.TTTEEE_lite_native: null
  planck_2018_lowl.TT: null
  bao.desi_dr2.desi_bao_all: null
  kids1000_cobaya.KiDS1000:
    python_path: /home/joe/Science/DGF/research/scripts
    data_directory: /mnt/Data/Science/DGF/research/dgf_env/data/KiDS-1000

params:
  omega_b:
    prior:
      min: 0.019
      max: 0.025
    ref:
      dist: norm
      loc: 0.02238
      scale: 0.0003
    proposal: 0.0002
    latex: \omega_b
  omega_cdm:
    prior:
      min: 0.08
      max: 0.2
    ref:
      dist: norm
      loc: 0.120
      scale: 0.003
    proposal: 0.003
    latex: \omega_{\rm cdm}
  h:
    prior:
      min: 0.6
      max: 0.8
    ref:
      dist: norm
      loc: 0.674
      scale: 0.005
    proposal: 0.012
    latex: h
  tau_reio:
    prior:
      min: 0.01
      max: 0.15
    ref:
      dist: norm
      loc: 0.054
      scale: 0.005
    proposal: 0.003
    latex: \tau_{\rm reio}
  n_s:
    prior:
      min: 0.9
      max: 1.1
    ref:
      dist: norm
      loc: 0.966
      scale: 0.005
    proposal: 0.004
    latex: n_s
  logA:
    prior:
      min: 2.8
      max: 3.2
    ref:
      dist: norm
      loc: 3.002
      scale: 0.015
    proposal: 0.01
    latex: \ln(10^{10}A_s)
  Sigma_lens:
    prior:
      min: -0.5
      max: 0.5
    ref:
      dist: norm
      loc: 0.0
      scale: 0.05
    proposal: 0.03
    latex: \Sigma_{\rm lens}
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.001
    latex: A_{\rm planck}
  H0:
    derived: true
    latex: H_0
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_m
  S8:
    derived: true
    latex: S_8
  rdrag:
    derived: true
    latex: r_{\rm drag}

sampler:
  mcmc:
    learn_proposal: true
    learn_proposal_Rminus1_max: 5.0
    max_samples: 50000
    max_tries: 1000000
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.1
    seed: 7007
    output_every: 60s
    learn_every: 40d
    burn_in: 500
    oversample_power: 0.4

output: chain_LF
packages_path: /home/joe/Science/DGF/research/data

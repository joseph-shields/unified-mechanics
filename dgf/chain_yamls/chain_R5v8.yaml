# Channel-Scan follow-up — Chain LFP (Light Flood PURE)
# After chain LF (with KiDS still in it as a "boundary check")
# converged at h = 0.7367 — the same matter attractor as T and T2 —
# we identified that KiDS's narrow physical-volume sampling (~10⁷⁵ cm³)
# combined with cobaya's volume-blind inverse-variance weighting was
# enough to dominate basin selection even at "85% light" stack design
# by raw inverse-variance contribution. See volume_weighting_methodology.md.
#
# Chain LFP tests the framework's prediction at TRUE light-only
# composition: drop KiDS entirely; keep only likelihoods whose physical
# sampling volume is comparable to Planck's full-sky integration.
#
# Stack: Planck plik_lite + Planck lowl + DESI DR2 BAO ONLY.
# All three sample large fractions of the cosmic volume:
#   Planck plik_lite:   V ≈ 3 × 10⁸⁵ cm³  (full sky × to last scattering)
#   Planck lowl:        V ≈ 3 × 10⁸⁵ cm³  (full sky × to last scattering)
#   DESI DR2 BAO:       V ≈ 5 × 10⁸² cm³  (~30% sky × z = 0.3-2.4)
#
# Total volume sampled: ~6 × 10⁸⁵ cm³, all light-channel.
# Matter-channel volume sampled: 0.
# This is 100/0/0 light/boundary/matter — pure light-channel test.
#
# w₀ FIXED at -0.933 (same as T/T2/LF; v7 inside training core).
#
# Predicted outcome: H₀ ≈ 65.7 ± 1.0 (the framework's light-channel
# H₀ value at fixed w₀ = -0.933, reproducing J6's H₀_light = 65.72).
# Post-hoc 𝒯_arithmetic = (H₀_chain + 73.29)/2 ≈ 69.50 ± 0.50,
# reproducing J6 thermocline equilibrium at extended dataset.
#
# Falsification: if the chain converges at h ≈ 0.737 (same matter
# attractor as T/T2/LF), the v7 emulator has a fixed-w₀ artefact
# that pushes h up regardless of dataset — and chain LFP will
# motivate transitioning to v8 emulator for any further fixed-w₀
# physics tests.


# Channel-Scan follow-up — Chain T2 (Heavier light disposition)
# Same data as chain T (Planck + DESI + BOSS + KiDS + TDCOSMO h prior),
# w0 fixed at -0.933, but with three changes designed to test whether
# chain T's h ≈ 0.736 peak is the global posterior maximum or a local
# basin-trap caused by adaptive-proposal collapse:
#   1. Starting reference values moved to Planck-native (h=0.674, ω_cdm=0.120)
#      — gives the chain a "heavier light disposition" at initialisation.
#   2. Initial proposal scale on h doubled (0.012 vs 0.006) so the chain
#      can transition between basins before proposal-learning narrows it.
#   3. learn_proposal_Rminus1_max lowered to 5.0 so proposal-learning
#      does not kick in until the chain is closer to convergence —
#      avoids locking the proposal to the first peak the chain finds.
#   4. Different seed (7006).
# If the chain stays near h=0.674 with good χ², the J6 result extends
# to KiDS+BOSS+DESI. If it rolls back to h≈0.736, the high-h basin
# really is the global minimum on this stack and we move to v8 free-w0.

theory:
  dgf_emulator_v7.DGFEmulator:
    python_path: /home/joe/Science/DGF/research/scripts
    w0: -0.933

likelihood:
  planck_2018_highl_plik.TTTEEE_lite_native: null
  planck_2018_lowl.TT: null
  bao.desi_dr2.desi_bao_all: null
  boss_fsigma8.BOSS_fsigma8:
    python_path: /home/joe/Science/DGF/research/scripts
  kids1000_cobaya.KiDS1000:
    python_path: /home/joe/Science/DGF/research/scripts
    data_directory: /mnt/Data/Science/DGF/research/dgf_env/data/KiDS-1000

# Matter-channel anchor: TDCOSMO-style Gaussian prior on h (= H0/100)
# Cobaya requires priors on input parameters. h_TDCOSMO = 73.29/100 = 0.7329.
prior:
  TDCOSMO_h_prior: 'lambda h: -((h - 0.7329) / 0.0168)**2 / 2'

params:
  omega_b:
    prior:
      min: 0.019
      max: 0.025
    ref:
      dist: norm
      loc: 0.02238
      scale: 0.0003
    proposal: 0.0002
    latex: \omega_b
  omega_cdm:
    prior:
      min: 0.08
      max: 0.2
    ref:
      dist: norm
      loc: 0.120
      scale: 0.003
    proposal: 0.003
    latex: \omega_{\rm cdm}
  h:
    prior:
      min: 0.6
      max: 0.8
    ref:
      dist: norm
      loc: 0.674
      scale: 0.005
    proposal: 0.012
    latex: h
  tau_reio:
    prior:
      min: 0.01
      max: 0.15
    ref:
      dist: norm
      loc: 0.054
      scale: 0.005
    proposal: 0.003
    latex: \tau_{\rm reio}
  n_s:
    prior:
      min: 0.9
      max: 1.1
    ref:
      dist: norm
      loc: 0.966
      scale: 0.005
    proposal: 0.004
    latex: n_s
  logA:
    prior:
      min: 2.8
      max: 3.2
    ref:
      dist: norm
      loc: 3.002
      scale: 0.015
    proposal: 0.01
    latex: \ln(10^{10}A_s)
  Sigma_lens:
    prior:
      min: -0.5
      max: 0.5
    ref:
      dist: norm
      loc: 0.0
      scale: 0.05
    proposal: 0.03
    latex: \Sigma_{\rm lens}
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.001
    latex: A_{\rm planck}
  H0:
    derived: true
    latex: H_0
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_m
  S8:
    derived: true
    latex: S_8
  rdrag:
    derived: true
    latex: r_{\rm drag}

sampler:
  mcmc:
    learn_proposal: true
    learn_proposal_Rminus1_max: 5.0
    max_samples: 50000
    max_tries: 1000000
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.1
    seed: 7006
    output_every: 60s
    learn_every: 40d
    burn_in: 500
    oversample_power: 0.4

output: chain_T2
packages_path: /home/joe/Science/DGF/research/data
